schema: spec-driven

context: |
  Tech stack: Next.js 16.2.9, React 19.2.4, TypeScript 5, Tailwind CSS v4, Prisma 7, PostgreSQL (via @prisma/adapter-pg), NextAuth v5 beta, Zod, Recharts, Sonner, Pusher.
  Architecture: Next.js App Router with API routes; pages under app/; shared logic under lib/ and components/; Prisma schema in prisma/.
  Testing: No test runner or test files detected. README lists automated tests as pending.
  Style: ESLint 9 with eslint-config-next (core-web-vitals + typescript); typecheck via tsc --noEmit; path alias @/* mapped to project root.

rules:
  proposal:
    - Include rollback plan for risky changes
    - Link changes to README MVP scope or future versions when applicable
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - Respect role-based access (paciente, nutriólogo, entrenador, admin)
  design:
    - Include sequence diagrams for complex flows (auth, payments, OCR validation)
    - Document architecture decisions with rationale
    - Prefer Next.js App Router patterns and server actions where appropriate
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
    - Flag tasks requiring DB migrations or seed updates
  apply:
    - Follow existing code patterns in app/, lib/, and components/
    - Prefer TypeScript strict mode compliance
    - Read node_modules/next/dist/docs/ for Next.js 16 API changes before writing code
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: "npm run build"
    typecheck_command: "npm run typecheck"
    lint_command: "npm run lint"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
    - Preserve audit trail; do not modify archived changes

testing:
  strict_tdd: false
  runner: null
  layers:
    unit:
      available: false
      tool: null
      command: null
    integration:
      available: false
      tool: null
      command: null
    e2e:
      available: false
      tool: null
      command: null
  coverage:
    available: false
    command: null
  quality:
    linter:
      available: true
      command: npm run lint
    type_checker:
      available: true
      command: npm run typecheck
    formatter:
      available: false
      tool: null
      command: null

project:
  name: consultorio
  path: /home/mrcasco/Documentos/consultorio
  package_manager: npm
  node_version: ">=20 (recommended 22+)"
  database: PostgreSQL
  orm: Prisma 7
  auth: NextAuth v5 beta
  key_dependencies:
    - next: 16.2.9
    - react: 19.2.4
    - react-dom: 19.2.4
    - prisma: 7.8.0
    - @prisma/client: 7.8.0
    - @prisma/adapter-pg: 7.8.0
    - next-auth: 5.0.0-beta.31
    - tailwindcss: 4
    - zod: 3.25.76

conventions:
  - Path alias @/* maps to project root
  - App Router under app/ with route groups for login/register/paciente/profesional
  - Prisma config in prisma.config.ts; migrations and seed in prisma/
  - Environment variables loaded via dotenv (DATABASE_URL required)
  - AGENTS.md references Next.js 16 breaking changes guide in node_modules

risks:
  - No automated tests; verification relies on build and typecheck only
  - Next.js 16 is a major version with breaking changes relative to training data
  - NextAuth v5 is still in beta; auth patterns may shift
  - README indicates several MVP features are incomplete (providers, registration, scheduling, chat, OCR, payments)
